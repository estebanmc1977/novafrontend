  - main [ref=e20]:
    - generic [ref=e22]:
      - paragraph [ref=e23]: Legal · Programa de Influencers
      - heading "Términos de Colaboración" [level=1] [ref=e24]
      - paragraph [ref=e25]: Versión 1.0 · Vigente desde mayo 2026 · México
    - paragraph [ref=e29]: Este documento describe cómo funciona la relación entre Novapatch y los creadores de contenido que forman parte de nuestro programa de embajadores. Lo escribimos en lenguaje claro para que sepas exactamente qué podés esperar de nosotros y qué esperamos de vos.
    - generic [ref=e31]:
      - generic [ref=e32]:
        - heading "1. Partes del acuerdo" [level=2] [ref=e33]
        - generic [ref=e34]: Este documento establece los términos de colaboración entre Novapatch México ("la Marca") y el creador de contenido que completa el formulario de postulación ("el Influencer"). La relación que se origina no es laboral ni de exclusividad, salvo que se acuerde expresamente por escrito.
      - generic [ref=e35]:
        - heading "2. Proceso de postulación y selección" [level=2] [ref=e36]
        - generic [ref=e37]: "El envío del formulario de postulación no garantiza la aceptación en el programa. Novapatch evaluará cada perfil de forma interna y notificará la decisión dentro de los 7 días hábiles posteriores al envío. Los criterios de selección incluyen, de forma no exhaustiva: nicho de contenido, tamaño y calidad de audiencia, alineación con los valores de la marca y tipo de colaboración solicitado."
      - generic [ref=e38]:
        - heading "3. Modalidades de colaboración" [level=2] [ref=e39]
        - generic [ref=e40]: "Las colaboraciones pueden ser de tres tipos: • Producto a cambio de contenido: el Influencer recibe productos Novapatch sin costo a cambio de publicar contenido acordado. • Colaboración paga: el Influencer recibe una compensación económica acordada previamente por la creación y publicación de contenido específico. • Embajador a largo plazo: relación continua con beneficios exclusivos y compensación recurrente, sujeta a contrato separado. En todos los casos, los términos específicos (piezas requeridas, plazos, formatos) se confirmarán por escrito antes del inicio de la colaboración."
      - generic [ref=e41]:
        - heading "4. Obligaciones del Influencer" [level=2] [ref=e42]
        - generic [ref=e43]: "Al participar en el programa, el Influencer se compromete a: • Publicar el contenido acordado dentro del plazo establecido. • Declarar explícitamente la relación comercial con Novapatch en cada publicación patrocinada, conforme a las normas de la FTC y la legislación mexicana vigente (uso de etiquetas como #Publicidad, #Ad o equivalentes). • No realizar afirmaciones médicas o de salud no autorizadas sobre los productos. • No colaborar con marcas directamente competidoras durante la vigencia activa de la colaboración, salvo acuerdo en contrario. • Compartir métricas de las publicaciones (alcance, impresiones, interacciones) dentro de los 7 días posteriores a cada publicación."
      - generic [ref=e44]:
        - heading "5. Obligaciones de Novapatch" [level=2] [ref=e45]
        - generic [ref=e46]: "Novapatch se compromete a: • Proveer los productos y/o compensación acordados dentro de los plazos estipulados. • Dar feedback sobre el contenido propuesto en un plazo máximo de 48 horas hábiles. • Respetar la voz y estilo creativo del Influencer, sin exigir alteraciones que comprometan su autenticidad. • Mantener la confidencialidad de la información personal y métricas compartidas por el Influencer."
      - generic [ref=e47]:
        - heading "6. Derechos de contenido" [level=2] [ref=e48]
        - generic [ref=e49]: El Influencer conserva la propiedad intelectual del contenido que crea. Al publicarlo, otorga a Novapatch una licencia no exclusiva para republicarlo en los canales propios de la marca (redes sociales, sitio web, newsletters) con atribución al creador. Novapatch no podrá modificar el contenido de forma sustancial ni utilizarlo en campañas de pago (meta ads, Google Ads, etc.) sin consentimiento escrito adicional del Influencer.
      - generic [ref=e50]:
        - heading "7. Productos y envíos" [level=2] [ref=e51]
        - generic [ref=e52]: Los productos enviados como parte de una colaboración son un beneficio asociado al programa y no constituyen pago por servicios. En caso de no publicarse el contenido acordado en el plazo establecido sin causa justificada, Novapatch podrá solicitar la devolución del producto o su equivalente en valor. Los envíos se realizan únicamente dentro del territorio mexicano en la Fase 1.
      - generic [ref=e53]:
        - heading "8. Privacidad de datos" [level=2] [ref=e54]
        - generic [ref=e55]: Los datos personales recopilados mediante el formulario de postulación (nombre, email, handles, métricas) se utilizan exclusivamente para evaluar y gestionar la relación de colaboración. No se comparten con terceros sin consentimiento, salvo obligación legal. Para más detalle, consultá nuestra Política de Privacidad en novapatch.care/privacidad.
      - generic [ref=e56]:
        - heading "9. Modificaciones y terminación" [level=2] [ref=e57]
        - generic [ref=e58]: Novapatch se reserva el derecho de modificar estos términos con previo aviso de 15 días. Cualquiera de las partes puede dar por finalizada la colaboración en cualquier momento, respetando los compromisos ya acordados y en curso. En caso de incumplimiento grave por parte del Influencer, Novapatch podrá suspender la relación de forma inmediata.
      - generic [ref=e59]:
        - heading "10. Jurisdicción" [level=2] [ref=e60]
        - generic [ref=e61]: Este acuerdo se rige por las leyes de los Estados Unidos Mexicanos. Cualquier disputa que no pueda resolverse de forma amigable será sometida a la jurisdicción de los tribunales competentes de la Ciudad de México.
