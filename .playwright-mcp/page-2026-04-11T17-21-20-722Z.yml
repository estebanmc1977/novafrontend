          - region "¿Cómo funcionan los parches Novapatch?" [ref=e603]:
            - paragraph [ref=e605]: Los parches Novapatch liberan sus ingredientes activos directamente a través de la piel hacia el torrente sanguíneo. A diferencia de las cápsulas orales, la absorción es gradual y constante durante 10 a 12 horas, evitando los picos y caídas de concentración.
        - generic [ref=e606]:
          - button "¿Cuánto tiempo tarda en hacer efecto?" [ref=e607]:
            - generic [ref=e608]: ¿Cuánto tiempo tarda en hacer efecto?
            - generic [ref=e609]: +
          - region "¿Cuánto tiempo tarda en hacer efecto?":
            - paragraph [ref=e610]: La absorción comienza en los primeros 30–60 minutos tras la aplicación. Para resultados óptimos recomendamos el uso constante durante al menos 2–3 semanas. Algunos usuarios reportan mejoras notables desde el primer día.
        - generic [ref=e611]:
          - button "¿Puedo usar más de un parche a la vez?" [ref=e612]:
            - generic [ref=e613]: ¿Puedo usar más de un parche a la vez?
            - generic [ref=e614]: +
          - region "¿Puedo usar más de un parche a la vez?":
            - paragraph [ref=e615]: Sí, puedes usar más de un parche simultáneamente siempre que sean de fórmulas diferentes. Los ingredientes de cada parche son complementarios y han sido formulados para usarse de forma segura en combinación. Consulta con tu médico si tienes condiciones específicas.
        - generic [ref=e616]:
          - button "¿Cómo funciona la suscripción?" [ref=e617]:
            - generic [ref=e618]: ¿Cómo funciona la suscripción?
            - generic [ref=e619]: +
          - region "¿Cómo funciona la suscripción?":
            - paragraph [ref=e620]: Elige la frecuencia (30, 60 o 90 días) y recibe tu caja automáticamente con hasta un 20% de descuento. Puedes pausar, cambiar de plan o cancelar en cualquier momento desde tu cuenta, sin penalizaciones ni contratos.
