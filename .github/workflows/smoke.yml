# novafrontend/.github/workflows/smoke.yml
name: Smoke Tests

on:
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/storefront/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: apps/storefront

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
        working-directory: apps/storefront

      - name: Run smoke tests
        run: pnpm test:e2e:smoke
        working-directory: apps/storefront
        env:
          BASE_URL: https://www.novapatch.care
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${{ secrets.MEDUSA_PUBLISHABLE_KEY }}

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: apps/storefront/playwright-report/

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          BRANCH: ${{ github.head_ref }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          jq -n \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg run_url "$RUN_URL" \
            --arg pr_url "$PR_URL" \
            '{
              text: ":x: *Smoke tests fallaron*",
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: (":x: *Smoke tests fallaron*\n*Branch:* `" + $branch + "`\n*Autor:* " + $actor + "\n*PR:* <" + $pr_url + "|Ver PR>")
                  }
                },
                {
                  type: "actions",
                  elements: [
                    {
                      type: "button",
                      text: { type: "plain_text", text: "Ver ejecución" },
                      url: $run_url
                    }
                  ]
                }
              ]
            }' \
          | curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d @-
